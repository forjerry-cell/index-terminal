name: AlphaFalcon 每日盤後自動掃描

on:
  # 台灣時間 16:30 = UTC 08:30，每週一至週五自動執行
  schedule:
    - cron: '30 8 * * 1-5'
  # 允許手動觸發（在 GitHub Actions 頁面點 Run workflow）
  workflow_dispatch:

jobs:
  daily-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: 簽出程式碼
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 設定 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝 Python 依賴套件
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy requests supabase scikit-learn joblib

      - name: 執行 AlphaFalcon 雲端掃描器
        env:
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          python Index/AlphaFalcon/alphafalcon_cloud_scanner.py

      - name: 提交並推送最新數據 JSON
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git commit -m "data: Auto-update AlphaFalcon daily scan results" || echo "No changes to commit"
          git push origin main

      - name: 掃描完成通知
        if: success()
        run: echo "AlphaFalcon 台股每日掃描與 Jamstack 部署成功！"
