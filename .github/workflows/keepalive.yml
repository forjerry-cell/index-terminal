name: Keep Alive (防止 GitHub 自動停用排程)

# GitHub 會在儲存庫超過 60 天沒有活動時自動停用 scheduled workflows
# 此 workflow 每 30 天執行一次空操作，確保掃描排程持續有效

on:
  schedule:
    # 每月 1 日與 15 日 UTC 00:00 執行
    - cron: '0 0 1,15 * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Keep alive ping
        run: echo "Keep alive - $(date)" && echo "台股與美股 AlphaFalcon 掃描排程保持活躍中"
