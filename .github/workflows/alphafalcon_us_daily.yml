name: AlphaFalcon-US 每日盤後自動掃描

on:
  # 美股收盤時間是紐約時間 16:00
  # 台灣時間夏令為 04:00 / 冬令為 05:00
  # 設定在 UTC 時間每週一至週五 22:30 執行 (＝ 台灣時間每週二至週六 06:30)
  schedule:
    - cron: '30 22 * * 1-5'
  # 允許手動觸發
  workflow_dispatch:

jobs:
  daily-scan-us:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: 簽出程式碼
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 設定 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝 Python 依賴套件
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy requests supabase

      - name: 執行 AlphaFalcon 美股雲端掃描器
        env:
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          python Index/AlphaFalcon/alphafalcon_us_cloud_scanner.py

      - name: 提交並推送最新數據 JSON
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git commit -m "data: Auto-update AlphaFalcon-US daily scan results [skip ci]" || echo "No changes to commit"
          git push origin main

      - name: 掃描完成通知
        if: success()
        run: echo "AlphaFalcon 美股每日掃描與 Jamstack 部署成功！"
