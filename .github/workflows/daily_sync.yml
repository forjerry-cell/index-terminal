name: Daily Index Sync

on:
  schedule:
    - cron: '30 8 * * *'  # 台北時間 16:30 (台股)
    - cron: '30 21 * * *' # 台北時間 05:30 (那指)
  workflow_dispatch:      # 允許手動觸發

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy supabase

      - name: Run sync script
        env:
          SUPABASE_URL: "https://nnoazshcucwjlccjqtkl.supabase.co"
          SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ub2F6c2hjdWN3amxjY2pxdGtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDgzNzYsImV4cCI6MjA5MjI4NDM3Nn0.FE-onwhqZNBWWdUBoqD1lR-n5So9PbQ9BvjB9pWCz6g"
        run: python scripts/sync_to_supabase.py

      - name: Send Daily Report Email
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -X POST https://index-terminal.vercel.app/api/send-report \
          -H "Content-Type: application/json" \
          -d "{\"secret\": \"$CRON_SECRET\"}"
